name:CI

on:
  push:
    brnaches: [main]
  pull_request:
    branches: [main]

jobs
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
    uses: actions/ checkout@v4

    - name: Set up Python
    uses: actions/ setup-python@v5
    with:
      python-versions: 3.12

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest tests/ -v
docker-build:
runs-on: ububtu-latest
needs: test
steps:
  - name: Check out code
    uses: actions/checkout@v4

  - name: Build Docker image
    rrun: docker build -t tinylink:latest .

